name = "nosmontres-prices"
main = "index.js"
compatibility_date = "2024-01-01"

# ── KV Namespace for lead storage ──────────────────────────────────────────
# One-time setup (run once from /worker/ folder):
#   npx wrangler kv:namespace create LEADS
# Copy the "id" from the output and paste it below, then deploy:
#   npx wrangler deploy

[[kv_namespaces]]
binding = "LEADS"
id = "37560864eed04f288995ddec3d7c0765"

# ── Admin secret for /leads.csv and /leads.json ──────────────────────────
# Set this secret via CLI (never commit real values):
#   npx wrangler secret put ADMIN_KEY
# Then download leads at:
#   https://nosmontres-prices.zoozoomfast.workers.dev/leads.csv?key=YOUR_SECRET
#   https://nosmontres-prices.zoozoomfast.workers.dev/leads.json?key=YOUR_SECRET
